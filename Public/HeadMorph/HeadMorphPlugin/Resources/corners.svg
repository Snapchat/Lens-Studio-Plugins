<svg width="122" height="122" viewBox="0 0 122 122" xmlns="http://www.w3.org/2000/svg">
  <!-- Define the mask -->
  <mask id="invertedCorners">
    <!-- Full opaque background -->
    <rect width="122" height="122" fill="white"/>
    <!-- Transparent inner square -->
    <rect x="0" y="4" width="122" height="114" fill="black"/>
    <rect x="4" y="0" width="114" height="122" fill="black"/>
    <!-- Transparent rounded corners to create the "cutout" effect -->
    <rect x="0" y="0" width="8" height="8" rx="4" ry="4" fill="black" />
    <rect x="114" y="0" width="8" height="8" rx="4" ry="4" fill="black" />
    <rect x="0" y="114" width="8" height="8" rx="4" ry="4" fill="black" />
    <rect x="114" y="114" width="8" height="8" rx="4" ry="4" fill="black" />
  </mask>

  <!-- Apply the mask to a colored background -->
  <rect width="122" height="122" fill="#363d45" mask="url(#invertedCorners)"/>
</svg>